            on_click:
              - lambda: |-
                  lv_obj_t *ta = id(kb_target) == 0 ? (lv_obj_t *) id(ta_lat)
                               : id(kb_target) == 1 ? (lv_obj_t *) id(ta_lon)
                               : id(kb_target) == 2 ? (lv_obj_t *) id(ta_rng)
                               : id(kb_target) == 3 ? (lv_obj_t *) id(ta_poll)
                                                    : (lv_obj_t *) id(ta_poll2);
                  lv_textarea_add_char(ta, '-');
        - button:
            x: 460
            y: 374
            width: 160
            height: 70
            radius: 6
            bg_color: 0x0A2416
            border_width: 1
            border_color: 0x00A050
            widgets:
              - label: { align: CENTER, text: "0", text_font: font_mid, text_color: 0x00C060 }
            on_click:
