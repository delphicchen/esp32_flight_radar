              selected:
                bg_color: 0x00C060
                text_color: 0x04180C
            # 顯示名的 index 必須對齊 radar_bg::tz_posix() 的 POSIX 陣列
            options:
              - "TAIPEI"
              - "TOKYO"
              - "SHANGHAI"
              - "HONG KONG"
              - "SEOUL"
              - "BANGKOK"
              - "LONDON"
              - "PARIS"
              - "BERLIN"
              - "NEW YORK"
              - "LOS ANGELES"
              - "UTC"
            on_value:
              - lambda: |-
                  int i = (int) x;
                  if (i == id(tz_sel)) return;          // set_selected_index 會回打,值沒變就跳過
                  id(tz_sel) = i;
                  id(rtc_time).set_timezone(radar_bg::tz_posix(i));
