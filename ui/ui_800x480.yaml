            widgets:
              - label: { align: CENTER, text: "SET", text_font: font_mid, text_color: 0x04180C }
            on_click:
              - lambda: |-
                  float la = atof(lv_textarea_get_text((lv_obj_t *) id(ta_lat)));
                  float lo = atof(lv_textarea_get_text((lv_obj_t *) id(ta_lon)));
                  float rg = atof(lv_textarea_get_text((lv_obj_t *) id(ta_rng)));
                  if (la >= -90 && la <= 90) {
                    auto c = id(home_lat).make_call(); c.set_value(la); c.perform();
                  }
                  if (lo >= -180 && lo <= 180) {
                    auto c = id(home_lon).make_call(); c.set_value(lo); c.perform();
                  }
                  if (rg >= 10 && rg <= 500) {
                    auto c = id(radar_range).make_call(); c.set_value(rg); c.perform();
                  }
                  int ps = atoi(lv_textarea_get_text((lv_obj_t *) id(ta_poll)));
                  if (ps >= 10 && ps <= 300) {
                    auto c = id(poll_interval).make_call(); c.set_value(ps); c.perform();
                  }
                  int p2 = atoi(lv_textarea_get_text((lv_obj_t *) id(ta_poll2)));
                  if (p2 >= 5 && p2 <= 300) {
                    auto c = id(poll_interval_alt).make_call(); c.set_value(p2); c.perform();
                  }
