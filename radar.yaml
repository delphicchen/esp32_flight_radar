# =============================================================
# Flight Radar — entry config for the original board:
#   ESP32-S3 + 800x480 parallel-RGB (ST7262) + GT911 touch.
#
# The firmware is now split into reusable packages so new
# display boards can be added without touching the shared logic:
#   common/core.yaml   shared logic + UI-independent components
#   boards/*.yaml      per-board hardware (MCU/PSRAM/display/touch)
#   ui/ui_*.yaml       LVGL layout for a given resolution
#
# Screen resolution + radar geometry live in `substitutions` below
# and flow into the fonts (common/core.yaml), the display driver and
# the C++ build flags (boards/*.yaml), and must match the ui/ package.
#
# To build another board, copy this file and swap the substitutions,
# `board` and `ui` packages (see radar-s3-5b.yaml / radar-p4-7b.yaml).
# =============================================================

substitutions:
  disp_w: "800"          # panel width  (px)
  disp_h: "480"          # panel height (px)
  radar_canvas: "456"    # square radar canvas side (px) — matches ui/ui_800x480.yaml
  # font sizes (scaled per resolution)
  f_small: "22"
  f_mid: "28"
  f_clock: "64"
  f_mono: "18"
  f_tiny: "14"

packages:
  core:  !include common/core.yaml
  board: !include boards/esp32s3_rgb_800x480.yaml
  ui:    !include ui/ui_800x480.yaml
