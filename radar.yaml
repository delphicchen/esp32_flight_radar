                  border_width: 1
                  border_color: 0x006030
                  radius: 8
                  selected:
                    bg_color: 0x00A050
                    text_color: 0x04180C
                  on_value:
                    - lambda: |-
                        uint32_t *p[4] = { &id(al0), &id(al1), &id(al2), &id(al3) };
                        uint32_t &a = *p[id(al_edit)];
                        if ((int) x == alarmpk::mm(a)) return;
                        a = alarmpk::set_m(a, (int) x);
                    - script.execute: alarm_refresh
