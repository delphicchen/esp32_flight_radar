                  const char *ci = lv_textarea_get_text((lv_obj_t *) id(ta_cid));
                  const char *se = lv_textarea_get_text((lv_obj_t *) id(ta_sec));
                  if (strlen(ci) > 0) {
                    auto c = id(opensky_client_id).make_call(); c.set_value(ci); c.perform();
                  }
                  if (strlen(se) > 0) {
                    auto c = id(opensky_client_secret).make_call(); c.set_value(se); c.perform();
                  }
                  if (strlen(ss) > 0 && strlen(ps) > 0)
                    wifi::global_wifi_component->save_wifi_sta(ss, ps);
