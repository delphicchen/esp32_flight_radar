                  align: CENTER
                  text: "PWR"
                  text_font: font_small
                  text_color: 0x00C060
            on_click:
              - lambda: |-
                  if (millis() - id(wake_ms) < 1500) {
                    // 喚醒後防誤觸:把狀態復原成按下
                    lv_obj_add_state((lv_obj_t *) id(pwr_btn), LV_STATE_CHECKED);
                    lv_obj_set_style_text_color(id(pwr_btn_l), lv_color_hex(0x04180C), 0);
                    return;
                  }
                  bool on = lv_obj_has_state((lv_obj_t *) id(pwr_btn), LV_STATE_CHECKED);
                  lv_obj_set_style_text_color(id(pwr_btn_l),
                      lv_color_hex(on ? 0x04180C : 0x00C060), 0);
                  if (on) {
                    auto call = id(backlight).turn_on();
                    call.perform();
                  } else {
                    auto call = id(backlight).turn_off();
                    call.perform();
                  }
